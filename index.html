<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>
  <link rel="icon" href="/assets/game-ZeAdQyym.jpg">
  <style>
    :root {
      --primary-color: #0a192f;
      --secondary-color: #1a365d;
      --tertiary-color: #2d3748;
      --accent-color: #64ffda;
      --text-light: #ffffff;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(-45deg, var(--primary-color), var(--secondary-color), var(--tertiary-color), var(--primary-color));
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: var(--text-light);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      margin: 13rem auto;
      padding: 2rem;
      max-width: 420px;
      border-radius: 16px;
      background-color: rgba(26, 54, 93, 0.9);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    .text {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .input {
      width: 80%;
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid var(--accent-color);
      background-color: transparent;
      color: var(--text-light);
      outline: none;
      transition: all 0.3s ease;
    }

    .input::placeholder {
      color: #a0aec0;
    }

    .input:focus {
      border-color: #00ffaa;
      box-shadow: 0 0 10px #64ffda88;
    }

    .button {
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      color: var(--primary-color);
      background-color: var(--accent-color);
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .button:hover {
      background-color: #00e6b3;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(0, 255, 200, 0.4);
    }
  </style>
</head>
<body>
  <script>
    function createComponent(text1, text2) {
      return new Promise((resolve) => {
        const container = document.createElement("div");
        container.classList.add("container");

        const textElement1 = document.createElement("p");
        textElement1.textContent = text1;
        textElement1.classList.add("text");
        container.appendChild(textElement1);

        const textElement2 = document.createElement("p");
        textElement2.textContent = text2;
        textElement2.classList.add("text");
        container.appendChild(textElement2);

        const inputElement = document.createElement("input");
        inputElement.type = "text";
        inputElement.placeholder = "Enter your answer...";
        inputElement.classList.add("input");
        container.appendChild(inputElement);

        const submitButton = document.createElement("button");
        submitButton.textContent = "Submit";
        submitButton.classList.add("button");
        container.appendChild(submitButton);

        document.body.innerHTML = "";
        document.body.appendChild(container);

        inputElement.focus();

        // Handle both button click and Enter key
        function submitAction() {
          const inputValue = inputElement.value.trim();
          resolve(inputValue);
        }

        submitButton.addEventListener("click", submitAction);
        inputElement.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            submitAction();
          }
        });
      });
    }

    async function newGame() {
      document.body.innerHTML = "";

      let numberOfQuestions = await createComponent(
        "How many questions would you like?",
        "Choose between 1 and 20"
      );

      numberOfQuestions = Number(numberOfQuestions);

      if (isNaN(numberOfQuestions) || numberOfQuestions <= 0 || numberOfQuestions > 20) {
        alert("Please enter a valid number between 1 and 20.");
        return newGame();
      }

      let score = 0;

      for (let i = 0; i < numberOfQuestions; i++) {
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 10) + 1;
        const answer = a * b;

        let userAnswer = await createComponent(`Question ${i + 1}:`, `${a} × ${b}`);
        userAnswer = Number(userAnswer);

        if (isNaN(userAnswer)) {
          i--; // retry same question
          continue;
        }

        if (userAnswer === answer) {
          score += Math.round(20 / numberOfQuestions);
        }
      }

      if (score > 20) score = 20;

      showResult(score);
    }

    function showResult(score) {
      document.body.innerHTML = "";

      const container = document.createElement("div");
      container.classList.add("container");

      const resultText = document.createElement("p");
      resultText.textContent = "Your final result:";
      resultText.classList.add("text");
      container.appendChild(resultText);

      const gradeText = document.createElement("p");
      gradeText.textContent = grade(score);
      gradeText.classList.add("text");
      container.appendChild(gradeText);

      const scoreText = document.createElement("p");
      scoreText.textContent = `Score: ${score} / 20`;
      scoreText.classList.add("text");
      container.appendChild(scoreText);

      const replayButton = document.createElement("button");
      replayButton.textContent = "Play Again";
      replayButton.classList.add("button");
      replayButton.addEventListener("click", newGame);
      container.appendChild(replayButton);

      document.body.appendChild(container);
    }

    function grade(score) {
      if (score === 0) return "You Lose 😢";
      if (score <= 10) return "Try Harder 💪";
      if (score <= 14) return "Keep Going 👍";
      if (score <= 17) return "You're Amazing! 🌟";
      if (score < 20) return "Excellent! 🔥";
      return "Perfect! 🏆";
    }

    // Start game automatically
    newGame();
  </script>
</body>
</html>
