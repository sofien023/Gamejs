<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=Cairo:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    [data-theme="dark"]{
      --bg:#080c14;--bg2:#111827;--bg3:#1a2235;
      --accent:#00e5b4;--text:#e8eaf2;--muted:#5a6378;
      --border:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.12);
      --danger:#f87171;--success:#00e5b4;
      --card-bg:rgba(17,24,39,0.92);
      --shadow:0 0 0 1px rgba(0,229,180,0.04),0 24px 64px rgba(0,0,0,0.5);
      --grid-color:rgba(0,229,180,0.025);--input-bg:#1a2235;
      --toggle-track:rgba(0,229,180,0.15);
      --timer-ok:#00e5b4;--timer-warn:#fbbf24;--timer-danger:#f87171;
      --rush:#ff6b35;--rush-bg:rgba(255,107,53,0.08);--rush-border:rgba(255,107,53,0.2);
    }
    [data-theme="light"]{
      --bg:#f0f4f8;--bg2:#e2e8f0;--bg3:#ffffff;
      --accent:#0099a8;--text:#1a202c;--muted:#718096;
      --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);
      --danger:#dc2626;--success:#0099a8;
      --card-bg:rgba(255,255,255,0.96);
      --shadow:0 0 0 1px rgba(0,153,168,0.08),0 24px 64px rgba(0,0,0,0.1);
      --grid-color:rgba(0,153,168,0.04);--input-bg:#f8fafc;
      --toggle-track:rgba(0,153,168,0.15);
      --timer-ok:#0099a8;--timer-warn:#d97706;--timer-danger:#dc2626;
      --rush:#e8500a;--rush-bg:rgba(232,80,10,0.07);--rush-border:rgba(232,80,10,0.2);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    body{
      background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow-x:hidden;padding:2rem 1rem;
      transition:background 0.35s ease,color 0.35s ease;
    }
    body.ar{font-family:'Cairo',sans-serif;}

    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),
        linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);
      background-size:52px 52px;pointer-events:none;z-index:0;
    }
    #canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* ── Top controls ── */
    .top-controls{
      position:fixed;top:1.1rem;right:1.2rem;
      display:flex;align-items:center;gap:8px;z-index:10;
    }
    html[dir="rtl"] .top-controls{right:auto;left:1.2rem;}

    .theme-toggle{
      position:relative;width:52px;height:26px;
      background:var(--toggle-track);border:1px solid var(--border-strong);
      border-radius:13px;cursor:pointer;
      transition:background 0.3s,border-color 0.3s;flex-shrink:0;
    }
    .theme-toggle::before{
      content:'';position:absolute;top:3px;left:3px;
      width:18px;height:18px;border-radius:50%;background:var(--accent);
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),background 0.3s;
    }
    [data-theme="light"] .theme-toggle::before{transform:translateX(26px);}
    .theme-toggle .ti{
      position:absolute;top:50%;transform:translateY(-50%);
      font-size:10px;line-height:1;pointer-events:none;transition:opacity 0.2s;
    }
    .ti-moon{left:5px;} .ti-sun{right:5px;}
    [data-theme="dark"] .ti-moon{opacity:1;} [data-theme="dark"] .ti-sun{opacity:0.4;}
    [data-theme="light"] .ti-moon{opacity:0.4;} [data-theme="light"] .ti-sun{opacity:1;}

    .lang-switcher{display:flex;gap:4px;}
    .lang-btn{
      background:transparent;border:1px solid var(--border-strong);color:var(--muted);
      font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.06em;
      padding:3px 8px;border-radius:2px;cursor:pointer;
      transition:border-color 0.2s,color 0.2s,background 0.2s;text-transform:uppercase;
    }
    .lang-btn:hover{border-color:var(--accent);color:var(--accent);}
    .lang-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

    /* ── Card (persistent container) ── */
    .card{
      position:relative;z-index:1;width:100%;max-width:480px;
      background:var(--card-bg);border:1px solid var(--border);border-radius:6px;
      padding:2.5rem 2.8rem;backdrop-filter:blur(12px);box-shadow:var(--shadow);
      transition:background 0.35s,border-color 0.35s,box-shadow 0.35s;
    }

    /* Rush mode card accent */
    .card.rush-mode{
      border-color:var(--rush-border);
      box-shadow:0 0 0 1px rgba(255,107,53,0.08),0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Inner content transitions ── */
    #screen{transition:opacity 0.18s ease,transform 0.18s ease;}
    #screen.fade-out{opacity:0;transform:translateY(8px);}
    #screen.fade-in{animation:screenIn 0.28s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes screenIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

    @keyframes shake{
      0%,100%{transform:translateX(0);}
      15%{transform:translateX(-6px);}30%{transform:translateX(6px);}
      45%{transform:translateX(-4px);}60%{transform:translateX(4px);}
      75%{transform:translateX(-2px);}90%{transform:translateX(2px);}
    }
    .shake{animation:shake 0.4s ease both;}

    @keyframes flashOk{
      0%{box-shadow:var(--shadow);}
      40%{box-shadow:0 0 0 3px rgba(0,229,180,0.35),var(--shadow);}
      100%{box-shadow:var(--shadow);}
    }
    [data-theme="light"] .flash-ok{animation-name:flashOkLight;}
    @keyframes flashOkLight{
      0%{box-shadow:var(--shadow);}
      40%{box-shadow:0 0 0 3px rgba(0,153,168,0.3),var(--shadow);}
      100%{box-shadow:var(--shadow);}
    }
    .flash-ok{animation:flashOk 0.5s ease both;}

    @keyframes flashRush{
      0%{box-shadow:0 0 0 1px rgba(255,107,53,0.08),0 24px 64px rgba(0,0,0,0.5);}
      40%{box-shadow:0 0 0 3px rgba(255,107,53,0.5),0 24px 64px rgba(0,0,0,0.5);}
      100%{box-shadow:0 0 0 1px rgba(255,107,53,0.08),0 24px 64px rgba(0,0,0,0.5);}
    }
    .flash-rush{animation:flashRush 0.5s ease both;}
    @keyframes flashRushWrong{
      0%,100%{box-shadow:0 0 0 1px rgba(255,107,53,0.08),0 24px 64px rgba(0,0,0,0.5);}
      40%{box-shadow:0 0 0 3px rgba(248,113,113,0.5),0 24px 64px rgba(0,0,0,0.5);}
    }
    .flash-rush-wrong{animation:flashRushWrong 0.4s ease both;}

    /* ── Card top ── */
    .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
    .logo-text{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:300;color:var(--text);}
    .logo-text span{color:var(--accent);}
    .badge{
      display:flex;align-items:center;gap:6px;font-size:0.65rem;
      letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);
      padding:3px 10px;border:1px solid rgba(0,229,180,0.2);border-radius:2px;
    }
    .badge.rush-badge{color:var(--rush);border-color:var(--rush-border);}
    [data-theme="light"] .badge{border-color:rgba(0,153,168,0.25);}
    body.ar .badge{letter-spacing:0;font-size:0.72rem;}
    .badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.8s ease-in-out infinite;}
    .badge.rush-badge .badge-dot{background:var(--rush);}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}

    /* ── Section label ── */
    .section-label{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
    body.ar .section-label{letter-spacing:0;}

    /* ── Difficulty row ── */
    .diff-row{display:flex;gap:6px;margin-bottom:1.5rem;}
    .mode-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:1.5rem;}
    .diff-btn,.mode-btn{
      flex:1;padding:0.55rem 0.4rem;font-family:'DM Mono',monospace;font-size:0.72rem;
      letter-spacing:0.05em;text-transform:uppercase;
      background:transparent;border:1px solid var(--border-strong);color:var(--muted);
      border-radius:2px;cursor:pointer;transition:border-color 0.2s,color 0.2s,background 0.2s;
    }
    body.ar .diff-btn, body.ar .mode-btn{font-family:'Cairo',sans-serif;letter-spacing:0;}
    .diff-btn:hover,.mode-btn:hover{border-color:var(--accent);color:var(--accent);}
    .diff-btn.active,.mode-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

    /* Rush variant buttons */
    .diff-btn.rush-active,.mode-btn.rush-active{background:var(--rush);color:#fff;border-color:var(--rush);}
    .diff-btn.rush-hover:hover,.mode-btn.rush-hover:hover{border-color:var(--rush);color:var(--rush);}

    /* ── Best streak on setup ── */
    .best-streak-banner{
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(0,229,180,0.05);border:1px solid rgba(0,229,180,0.12);
      border-radius:3px;padding:0.55rem 0.9rem;margin-bottom:1.5rem;font-size:0.72rem;color:var(--muted);
    }
    [data-theme="light"] .best-streak-banner{background:rgba(0,153,168,0.05);border-color:rgba(0,153,168,0.15);}
    .best-streak-banner strong{color:var(--accent);font-size:1rem;font-family:'Fraunces',serif;font-weight:300;}

    /* ── Rush Mode Banner ── */
    .rush-banner{
      display:flex;align-items:center;gap:10px;
      background:var(--rush-bg);border:1px solid var(--rush-border);
      border-radius:3px;padding:0.65rem 0.9rem;margin-bottom:1.4rem;
    }
    .rush-banner-icon{font-size:1.1rem;}
    .rush-banner-text{font-size:0.72rem;color:var(--rush);line-height:1.5;}
    .rush-banner-text strong{display:block;font-size:0.78rem;letter-spacing:0.04em;text-transform:uppercase;}

    /* ── Dashboard Grid ── */
    .dashboard-stats{
      display:grid;grid-template-columns:repeat(3, 1fr);gap:1px;
      background:var(--border);border:1px solid var(--border);
      border-radius:4px;overflow:hidden;margin-bottom:1.5rem;
    }
    .stat-box{background:var(--bg3);padding:1.2rem 0.4rem;text-align:center;transition:background 0.35s;}
    .stat-num{font-family:'Fraunces',serif;font-size:1.8rem;color:var(--accent);line-height:1.2;}
    .stat-lbl{font-size:0.6rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

    /* ── Dashboard action cards ── */
    .dash-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
    .dash-card{
      padding:1.1rem 1rem;border:1px solid var(--border-strong);border-radius:3px;
      cursor:pointer;background:transparent;text-align:left;
      transition:border-color 0.2s,background 0.2s,transform 0.15s;
    }
    .dash-card:hover{border-color:var(--accent);background:rgba(0,229,180,0.04);transform:translateY(-1px);}
    .dash-card.rush-card:hover{border-color:var(--rush);background:var(--rush-bg);}
    .dash-card-icon{font-size:1.3rem;margin-bottom:0.4rem;display:block;}
    .dash-card-title{font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text);display:block;margin-bottom:2px;}
    .dash-card-desc{font-size:0.63rem;color:var(--muted);line-height:1.5;}
    .rush-card .dash-card-title{color:var(--rush);}
    [data-theme="light"] .dash-card:hover{border-color:var(--accent);}

    /* ── Progress ── */
    .progress-wrap{margin-bottom:1.2rem;}
    .progress-meta{
      display:flex;justify-content:space-between;align-items:center;
      font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;
      text-transform:uppercase;margin-bottom:0.5rem;
    }
    body.ar .progress-meta{letter-spacing:0;}
    .progress-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.4s ease;}

    /* ── Timer ── */
    .timer-wrap{margin-bottom:1.2rem;}
    .timer-meta{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-bottom:4px;}
    .timer-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
    .timer-fill{height:100%;border-radius:2px;transition:background 0.3s;background:var(--timer-ok);}
    .timer-fill.warn{background:var(--timer-warn);}
    .timer-fill.danger{background:var(--timer-danger);}
    .timer-fill.rush-timer{background:var(--rush);}

    /* ── Rush lives ── */
    .lives-wrap{display:flex;align-items:center;gap:6px;margin-bottom:1rem;}
    .life{font-size:1rem;transition:all 0.2s;filter:grayscale(0);}
    .life.lost{filter:grayscale(1);opacity:0.25;transform:scale(0.85);}
    @keyframes lifeLost{0%{transform:scale(1.4);}100%{transform:scale(0.85);}}
    .life.losing{animation:lifeLost 0.3s ease both;}

    /* ── Rush score bar ── */
    .rush-score-bar{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--rush-bg);border:1px solid var(--rush-border);
      border-radius:3px;padding:0.5rem 0.9rem;margin-bottom:1rem;font-size:0.72rem;
    }
    .rush-score-num{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--rush);line-height:1;}
    .rush-score-lbl{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}

    /* ── Time bonus flash ── */
    .time-bonus{
      font-size:0.68rem;color:var(--accent);margin-left:6px;
      display:inline-block;opacity:0;
      animation:bonusPop 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes bonusPop{0%{opacity:0;transform:translateY(4px);}30%{opacity:1;transform:translateY(-2px);}100%{opacity:0;transform:translateY(-8px);}}

    /* ── Streak ── */
    .streak-badge{
      display:inline-flex;align-items:center;gap:4px;
      background:rgba(0,229,180,0.08);border:1px solid rgba(0,229,180,0.15);
      border-radius:2px;padding:1px 7px;font-size:0.68rem;color:var(--accent);
    }
    .streak-badge.rush-streak{background:var(--rush-bg);border-color:var(--rush-border);color:var(--rush);}
    [data-theme="light"] .streak-badge{background:rgba(0,153,168,0.07);border-color:rgba(0,153,168,0.2);}
    @keyframes streakPop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
    .streak-badge.pop{animation:streakPop 0.3s cubic-bezier(0.34,1.56,0.64,1);}

    /* ── Q label & text ── */
    .q-label{
      font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--accent);margin-bottom:0.8rem;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .q-label.rush-label{color:var(--rush);}
    .q-label-left{display:flex;align-items:center;gap:8px;}
    .q-label-left::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent);}
    .rush-label .q-label-left::before{background:var(--rush);}
    body.ar .q-label{letter-spacing:0;}
    .q-text{
      font-family:'Fraunces',serif;font-size:clamp(2.2rem,8vw,3.8rem);
      font-weight:300;line-height:1.1;letter-spacing:-0.02em;color:var(--text);margin-bottom:1.6rem;
    }
    body.ar .q-text{font-family:'Cairo',sans-serif;letter-spacing:0;}
    .q-text em{font-style:italic;color:var(--accent);}
    .q-text.rush-q em{color:var(--rush);}
    .q-sub{font-size:0.85rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;}

    /* ── Input / buttons ── */
    .input-wrap{position:relative;margin-bottom:1.2rem;}
    .input{
      width:100%;background:var(--input-bg);border:1px solid var(--border);
      padding:1.1rem;font-family:'DM Mono',monospace;font-size:1.4rem;color:var(--text);
      border-radius:2px;outline:none;transition:border-color 0.2s,background 0.35s,color 0.35s;
      -moz-appearance:textfield;
    }
    body.ar .input{font-family:'Cairo',sans-serif;}
    .input::-webkit-outer-spin-button,.input::-webkit-inner-spin-button{-webkit-appearance:none;}
    .input::placeholder{color:var(--muted);}
    .input:focus{border-color:rgba(0,229,180,0.4);}
    .input.rush-input:focus{border-color:rgba(255,107,53,0.5);}
    [data-theme="light"] .input:focus{border-color:rgba(0,153,168,0.5);}
    .input.correct{border-color:var(--success);}
    .input.wrong{border-color:var(--danger);}
    .input:disabled{opacity:0.6;cursor:not-allowed;}

    /* ── Skip hint ── */
    .skip-hint{font-size:0.65rem;color:var(--muted);margin-top:-0.6rem;margin-bottom:1rem;opacity:0.75;}
    .skip-hint kbd{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:0.63rem;transition:background 0.35s,border-color 0.35s;}

    .btn{
      width:100%;padding:0.8rem 1.6rem;
      font-family:'DM Mono',monospace;font-size:0.82rem;letter-spacing:0.08em;
      text-transform:uppercase;background:var(--accent);color:var(--bg);
      border:none;border-radius:2px;cursor:pointer;transition:filter 0.2s,transform 0.1s;
    }
    body.ar .btn{font-family:'Cairo',sans-serif;letter-spacing:0;}
    .btn:hover:not(:disabled){filter:brightness(0.9);}
    .btn:active:not(:disabled){transform:scale(0.98);}
    .btn:disabled{opacity:0.45;cursor:default;}
    .btn.rush-btn{background:var(--rush);}
    .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);margin-top:0.8rem;}
    .btn-outline:hover:not(:disabled){background:rgba(0,229,180,0.07);}
    .btn-outline.rush-outline{color:var(--rush);border-color:var(--rush);}
    .btn-outline.rush-outline:hover:not(:disabled){background:var(--rush-bg);}
    [data-theme="light"] .btn-outline:hover:not(:disabled){background:rgba(0,153,168,0.07);}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);margin-top:0.8rem;}
    .btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border-strong);}

    .feedback{font-size:0.78rem;height:1.4rem;margin-bottom:0.8rem;transition:color 0.2s;display:flex;align-items:center;gap:6px;}
    .feedback.ok{color:var(--success);}
    .feedback.err{color:var(--danger);}

    /* ── Score grid ── */
    .score-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:1px;
      background:var(--border);border:1px solid var(--border);
      border-radius:4px;overflow:hidden;margin-bottom:1.8rem;
    }
    .score-cell{background:var(--bg3);padding:1.2rem 1rem;text-align:center;transition:background 0.35s;}
    .score-num{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:300;color:var(--accent);line-height:1;}
    .score-num.rush-num{color:var(--rush);}
    .score-lbl{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    body.ar .score-lbl{letter-spacing:0;}

    .grade-tag{display:inline-block;font-size:0.75rem;letter-spacing:0.08em;padding:6px 14px;border-radius:2px;margin-bottom:1.8rem;text-transform:uppercase;}
    body.ar .grade-tag{letter-spacing:0;}
    .grade-perfect{background:rgba(0,229,180,0.12);color:var(--accent);border:1px solid rgba(0,229,180,0.3);}
    [data-theme="light"] .grade-perfect{background:rgba(0,153,168,0.1);border-color:rgba(0,153,168,0.3);}
    .grade-great{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);}
    [data-theme="light"] .grade-great{color:#1d4ed8;background:rgba(59,130,246,0.1);}
    .grade-good{background:rgba(250,204,21,0.1);color:#fde68a;border:1px solid rgba(250,204,21,0.25);}
    [data-theme="light"] .grade-good{color:#92400e;background:rgba(250,204,21,0.15);}
    .grade-fail{background:rgba(248,113,113,0.1);color:var(--danger);border:1px solid rgba(248,113,113,0.25);}
    .grade-rush{background:var(--rush-bg);color:var(--rush);border:1px solid var(--rush-border);}

    .divider{height:1px;background:var(--border);margin:1.5rem 0;transition:background 0.35s;}
    .hint{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:1rem;}
    .hint kbd{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:0.7rem;transition:background 0.35s,border-color 0.35s;}

    /* ── History ── */
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .history-title{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;}
    .history-title::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent);}
    body.ar .history-title{letter-spacing:0;}
    .clear-btn{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.06em;background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:2px;cursor:pointer;transition:0.2s;text-transform:uppercase;}
    .clear-btn:hover{border-color:var(--danger);color:var(--danger);}
    .history-empty{font-size:0.8rem;color:var(--muted);text-align:center;padding:1.5rem 0;}
    .history-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;max-height:260px;overflow-y:auto;}
    .history-list::-webkit-scrollbar{width:4px;}
    .history-list::-webkit-scrollbar-track{background:transparent;}
    .history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .history-row{background:var(--bg3);padding:0.7rem 1rem;display:grid;grid-template-columns:1fr auto;gap:0.6rem;align-items:center;font-size:0.78rem;transition:background 0.15s;}
    .history-row:hover{background:var(--bg2);}
    .history-row.rush-row{border-left:2px solid var(--rush);}
    .history-row-top{display:flex;justify-content:space-between;align-items:center;gap:0.5rem;}
    .history-row-bottom{display:flex;align-items:center;gap:0.5rem;margin-top:2px;}
    .history-date{color:var(--muted);font-size:0.66rem;}
    .history-score{color:var(--accent);font-weight:500;white-space:nowrap;font-size:0.8rem;}
    .history-score.rush-score{color:var(--rush);}
    .history-grade{font-size:0.62rem;padding:2px 7px;border-radius:2px;white-space:nowrap;}
    .history-meta-tag{font-size:0.6rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:1px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:0.05em;}
    .history-meta-tag.rush-tag{color:var(--rush);border-color:var(--rush-border);background:var(--rush-bg);}

    /* ── History tabs ── */
    .history-tabs{display:flex;gap:4px;margin-bottom:1rem;}
    .hist-tab{
      flex:1;padding:0.45rem 0.5rem;font-family:'DM Mono',monospace;font-size:0.68rem;
      letter-spacing:0.05em;text-transform:uppercase;
      background:transparent;border:1px solid var(--border-strong);color:var(--muted);
      border-radius:2px;cursor:pointer;transition:0.2s;
    }
    .hist-tab:hover{border-color:var(--accent);color:var(--accent);}
    .hist-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
    .hist-tab.rush-tab-active{background:var(--rush);color:#fff;border-color:var(--rush);}
    .hist-tab.rush-tab-inactive:hover{border-color:var(--rush);color:var(--rush);}

    @media(max-width:500px){
      .card{padding:1.8rem 1.5rem;}
      .history-row{grid-template-columns:1fr;}
      .diff-row{flex-wrap:wrap;}
      .mode-row{grid-template-columns:1fr 1fr 1fr;}
      .dash-actions{grid-template-columns:1fr;}
    }
  </style>
</head>

  const DIFFICULTY = {
    easy:  {min:1, max:5,  timePerQ:16, bonusThreshold:0.6},
    medium:{min:1, max:10, timePerQ:12, bonusThreshold:0.5},
    hard:  {min:6, max:12, timePerQ:8,  bonusThreshold:0.4}
  };
  const RUSH_LIVES = 3;
  const MODE_LABELS = {mult:'×', div:'÷', add:'+', sub:'−', random:'?'};

  /* ── State ── */
  let lang          = detectLang();
  let currentTheme  = detectTheme();
  let currentScreen = null;
  let selectedDiff  = loadPref('quiz-diff','medium');
  let selectedMode  = loadPref('quiz-mode','random');
  let rushDiff      = loadPref('quiz-rush-diff','medium');
  let rushMode      = loadPref('quiz-rush-mode','random');
  let histTab       = 'all'; // 'all' | 'classic' | 'rush'

  /* ── Audio ── */
  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, duration, gain=0.18){
    try{
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gn  = ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gn.gain.setValueAtTime(gain, ctx.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
    }catch(e){}
  }
  function soundCorrect(){ playTone(523.25,'sine',0.12,0.14); setTimeout(()=>playTone(783.99,'sine',0.15,0.12),80); }
  function soundWrong(){ playTone(220,'sawtooth',0.18,0.12); }
  function soundTimeout(){ playTone(180,'sine',0.3,0.15); }
  function soundSkip(){ playTone(350,'triangle',0.1,0.1); }
  function soundRushLost(){ playTone(200,'sawtooth',0.25,0.18); setTimeout(()=>playTone(150,'sawtooth',0.3,0.18),120); }
  function soundRushRecord(){ [0,80,160,240].forEach((d,i)=>setTimeout(()=>playTone([523,659,784,1047][i],'sine',0.2,0.15),d)); }

  /* ── Core Logic ── */
  function detectLang(){
    const s=localStorage.getItem('quiz-lang')||navigator.language||'en';
    if(s.startsWith('ar')) return 'ar';
    if(s.startsWith('fr')) return 'fr';
    return 'en';
  }
  function setLang(l){
    lang=l;
    localStorage.setItem('quiz-lang',l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='ar'?'rtl':'ltr';
    if(l==='ar') document.body.classList.add('ar'); else document.body.classList.remove('ar');
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
    if(currentScreen) currentScreen();
  }
  function t(){ return T[lang]; }

  function detectTheme(){ return localStorage.getItem('quiz-theme')||'dark'; }
  function setTheme(th){ currentTheme=th; localStorage.setItem('quiz-theme',th); document.documentElement.setAttribute('data-theme',th); }
  function toggleTheme(){ setTheme(currentTheme==='dark'?'light':'dark'); }

  function loadPref(k,def){ return localStorage.getItem(k)||def; }
  function savePref(k,v){ localStorage.setItem(k,v); }

  function loadHistory(){ try{return JSON.parse(localStorage.getItem('quiz-history')||'[]');}catch(e){return [];} }
  function addHistory(item){
    const h=loadHistory(); h.unshift(item);
    localStorage.setItem('quiz-history',JSON.stringify(h.slice(0,50)));
  }
  function clearHistory(){ localStorage.removeItem('quiz-history'); }
  function allTimeBestStreak(){ return loadHistory().filter(h=>!h.rush).reduce((m,h)=>Math.max(m,h.bestStreak||0),0); }
  function rushBestScore(){ return loadHistory().filter(h=>h.rush).reduce((m,h)=>Math.max(m,h.score||0),0); }

  function getGlobalStats() {
    const h = loadHistory().filter(x=>!x.rush);
    if (h.length === 0) return { total: 0, avg: 0, games: 0 };
    const totalSolved = h.reduce((s, g) => s + g.score, 0);
    const totalQ = h.reduce((s, g) => s + g.total, 0);
    return { total: totalSolved, avg: totalQ>0?Math.round((totalSolved / totalQ) * 100):0, games: h.length };
  }

  /* ── Canvas Background ── */
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  let pts=[],w,h;
  function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; initPts(); }
  function initPts(){ pts=[]; for(let i=0;i<45;i++) pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4}); }
  window.addEventListener('resize',resize); resize();
  function drawPts(){
    ctx.clearRect(0,0,w,h);
    const al=currentTheme==='dark'?1:0.4, r=currentTheme==='dark'?0:0, g=currentTheme==='dark'?229:153, b=currentTheme==='dark'?180:168;
    for(let i=0;i<pts.length;i++){
      let p=pts[i]; p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
      ctx.fillStyle=`rgba(${r},${g},${b},${0.15*al})`; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
      for(let j=i+1;j<pts.length;j++){
        let d=Math.hypot(p.x-pts[j].x, p.y-pts[j].y);
        if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${r},${g},${b},${0.04*(1-d/110)*al})`;ctx.lineWidth=0.5;ctx.stroke();}
      }
    }
    requestAnimationFrame(drawPts);
  }
  drawPts();

  /* ── Smooth screen transitions ── */
  const screen = document.getElementById('screen');
  const card   = document.getElementById('card');

  function render(html, isRush=false){
    screen.classList.remove('fade-in');
    screen.classList.add('fade-out');
    card.classList.toggle('rush-mode', isRush);
    setTimeout(()=>{
      screen.innerHTML = html;
      screen.classList.remove('fade-out');
      screen.classList.add('fade-in');
    }, 190);
  }

  function topBar(badgeKey, isRush=false){
    const logoSpan = isRush ? `<span style="color:var(--rush)">${t().logo2}</span>` : `<span>${t().logo2}</span>`;
    const badgeCls = isRush ? 'badge rush-badge' : 'badge';
    return `<div class="card-top">
      <div class="logo-text">${t().logo1} ${logoSpan}</div>
      <div class="${badgeCls}" role="status"><span class="badge-dot" aria-hidden="true"></span>${t()[badgeKey]}</div>
    </div>`;
  }

  function gradeInfo(score,total){
    const p=total>0?score/total:0;
    if(p===1)   return{label:t().grade_perfect, cls:'grade-perfect'};
    if(p>=0.85) return{label:t().grade_excellent,cls:'grade-great'};
    if(p>=0.70) return{label:t().grade_amazing,  cls:'grade-great'};
    if(p>=0.50) return{label:t().grade_keep,     cls:'grade-good'};
    if(p>0)     return{label:t().grade_harder,   cls:'grade-fail'};
    return           {label:t().grade_lose,      cls:'grade-fail'};
  }

  function formatDate(ts){
    const d=new Date(ts),o={day:'2-digit',month:'2-digit',year:'numeric'},t2={hour:'2-digit',minute:'2-digit'};
    if(lang==='ar') return d.toLocaleDateString('ar-TN',o)+' '+d.toLocaleTimeString('ar-TN',t2);
    if(lang==='fr') return d.toLocaleDateString('fr-FR',o)+' '+d.toLocaleTimeString('fr-FR',t2);
    return d.toLocaleDateString('en-GB',o)+' '+d.toLocaleTimeString('en-GB',t2);
  }

  function animateCount(el,target,dur=650){
    if(!el) return;
    const start=performance.now();
    (function step(now){
      const p=Math.min((now-start)/dur,1), ease=1-Math.pow(1-p,3);
      el.textContent=Math.round(ease*target);
      if(p<1) requestAnimationFrame(step); else el.textContent=target;
    })(start);
  }

  /* ── DASHBOARD ── */
  function showDashboard(){
    currentScreen = showDashboard;
    const stats = getGlobalStats();
    const best = allTimeBestStreak();
    const rushBest = rushBestScore();
    const hasHistory = loadHistory().length > 0;

    render(`
      ${topBar('badge_dashboard')}
      <div class="q-label"><span class="q-label-left">${t().dash_title}</span></div>
      <div class="dashboard-stats">
        <div class="stat-box"><div class="stat-num" id="ds0">0</div><div class="stat-lbl">${t().dash_total}</div></div>
        <div class="stat-box"><div class="stat-num" id="ds1">0</div><div class="stat-lbl">${t().dash_avg}</div></div>
        <div class="stat-box"><div class="stat-num" id="ds2">0</div><div class="stat-lbl">${t().dash_games}</div></div>
      </div>
      ${best>0?`<div class="best-streak-banner"><span>${t().all_time_best}</span><strong>🔥 ${best}</strong></div>`:''}

      <div class="dash-actions">
        <button class="dash-card" id="btnClassic">
          <span class="dash-card-icon">📐</span>
          <span class="dash-card-title">${t().classic_mode}</span>
          <span class="dash-card-desc">${t().how_many.replace('?','')}</span>
        </button>
        <button class="dash-card rush-card" id="btnRush">
          <span class="dash-card-icon">⚡</span>
          <span class="dash-card-title">${t().rush_mode}</span>
          <span class="dash-card-desc">${t().rush_desc.substring(0,40)}…${rushBest>0?' 🏆 '+rushBest:''}</span>
        </button>
      </div>

      ${hasHistory?`<button class="btn btn-ghost" id="viewHist">${t().view_history}</button>`:''}
    `);

    [stats.total, stats.avg, stats.games].forEach((v, i) => {
      animateCount(document.getElementById('ds'+i), v, 800);
    });

    document.getElementById('btnClassic').addEventListener('click', showSetup);
    document.getElementById('btnRush').addEventListener('click', showRushSetup);
    const vh = document.getElementById('viewHist');
    if(vh) vh.addEventListener('click', showHistory);
  }

  /* ── SETUP (Classic) ── */
  function showSetup(){
    currentScreen=showSetup;
    render(`
      ${topBar('badge_quiz')}
      <div class="q-label"><span class="q-label-left">${t().new_game}</span></div>

  /* ── RUSH GAME ── */
  function startRushGame(diff, mode){
    const timePerQ = DIFFICULTY[diff].timePerQ;
    let lives = RUSH_LIVES, score = 0, streak = 0, bestStreak = 0;
    let answered = false, timerInterval = null, timeLeft = timePerQ;
    let currentQ = null;

    function makeQ(){
      const ops = ['mult','div','add','sub'];
      const op = (mode !== 'random') ? mode : ops[Math.floor(Math.random()*4)];
      const {min,max} = DIFFICULTY[diff];
      let a=Math.floor(Math.random()*(max-min+1))+min;
      let b=Math.floor(Math.random()*(max-min+1))+min;
      let answer,display;
      if(op==='mult'){ answer=a*b; display=`<em>${a}</em> × <em>${b}</em>`; }
      else if(op==='div'){ const prod=a*b; answer=a; a=prod; display=`<em>${a}</em> ÷ <em>${b}</em>`; }
      else if(op==='add'){ answer=a+b; display=`<em>${a}</em> + <em>${b}</em>`; }
      else { if(a<b){const tmp=a;a=b;b=tmp;} answer=a-b; display=`<em>${a}</em> − <em>${b}</em>`; }
      return{display,answer};
    }

    function livesHtml(){
      let s='';
      for(let i=0;i<RUSH_LIVES;i++) s+=`<span class="life${i>=lives?' lost':''}" id="life${i}">❤️</span>`;
      return s;
    }

    function clearTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

    function renderGame(){
      currentQ = makeQ();
      answered = false; timeLeft = timePerQ;
      currentScreen = renderGame;

      render(`
        ${topBar('badge_rush', true)}
        <div class="rush-score-bar">
          <div><div class="rush-score-num" id="rushScoreNum">${score}</div><div class="rush-score-lbl">${t().rush_solved}</div></div>
          <div class="lives-wrap" id="livesWrap">${livesHtml()}</div>
          <div><div class="rush-score-num" id="rushBestNum" style="font-size:1rem;color:var(--muted)">${rushBestScore()>0?'⚡'+rushBestScore():''}</div><div class="rush-score-lbl">${t().rush_record}</div></div>
        </div>
        <div class="timer-wrap">
          <div class="timer-meta"><span>${t().timer_label}</span><span id="tl">${timePerQ}s</span></div>
          <div class="timer-track"><div class="timer-fill rush-timer" id="tf" style="width:100%"></div></div>
        </div>
        <div class="q-label rush-label">
          <span class="q-label-left">${t().q_label} #${score+1}</span>
          <span class="streak-badge rush-streak" id="sb">🔥 ${streak}</span>
        </div>
        <div class="q-text rush-q">${currentQ.display} = ?</div>
        <div class="input-wrap">
          <input id="inp" class="input rush-input" type="number" placeholder="…"
            aria-label="Your answer" autocomplete="off" autofocus>
        </div>
        <div class="feedback" id="fb" role="alert" aria-live="assertive"></div>
        <button class="btn rush-btn" id="go">${t().submit}</button>
      `, true);

      const inp=document.getElementById('inp'), fill=document.getElementById('tf'), tEl=document.getElementById('tl');
      inp.focus();

      timerInterval = setInterval(()=>{
        timeLeft = Math.max(0, timeLeft-0.1);
        const p = (timeLeft/timePerQ)*100;
        if(fill){ fill.style.width=p+'%'; }
        if(tEl) tEl.textContent = Math.ceil(timeLeft)+'s';
        if(timeLeft<=0){ clearTimer(); if(!answered) doRushAnswer(null); }
      },100);

      document.getElementById('go').addEventListener('click',()=>doRushAnswer(parseInt(inp.value)));
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')doRushAnswer(parseInt(inp.value));});
    }

    function doRushAnswer(v){
      if(answered) return; answered=true;
      clearTimer();
      const inp=document.getElementById('inp'), fb=document.getElementById('fb'), sb=document.getElementById('sb');

      if(v===currentQ.answer){
        score++; streak++; if(streak>bestStreak) bestStreak=streak;
        if(inp) inp.classList.add('correct');
        if(fb){ fb.textContent=t().correct_msg; fb.className='feedback ok'; }
        card.classList.remove('flash-rush-wrong');
        void card.offsetWidth;
        card.classList.add('flash-rush');
        setTimeout(()=>card.classList.remove('flash-rush'),500);
        if(sb){ sb.textContent='🔥 '+streak; sb.classList.remove('pop'); void sb.offsetWidth; sb.classList.add('pop'); }
        soundCorrect();
        setTimeout(renderGame, 900);
      } else {
        // Lose a life
        streak = 0;
        lives--;
        if(inp) inp.classList.add('wrong');
        if(fb){ fb.textContent=`${t().wrong_prefix} ${currentQ.answer}`; fb.className='feedback err'; }
        if(sb) sb.textContent='🔥 0';

        // Animate lost life
        const lifeEl = document.getElementById('life'+lives);
        if(lifeEl){ lifeEl.classList.add('losing'); setTimeout(()=>lifeEl.classList.add('lost'),300); }

        card.classList.remove('flash-rush');
        void card.offsetWidth;
        card.classList.add('shake','flash-rush-wrong');
        setTimeout(()=>card.classList.remove('shake','flash-rush-wrong'),500);

        if(lives<=0){
          soundRushLost();
          setTimeout(()=>showRushResult(score,bestStreak,diff,mode), 1100);
        } else {
          soundWrong();
          setTimeout(renderGame, 1100);
        }
      }
    }

    renderGame();
  }

  /* ── CLASSIC GAME ── */
  function startGame(total,diff,mode){
    const pickOperation = (m) => (m !== 'random' ? m : ['mult','div','add','sub'][Math.floor(Math.random()*4)]);
    const questions = Array.from({length:total}, () => {
      const op = pickOperation(mode);
      const {min,max}=DIFFICULTY[diff];
      let a=Math.floor(Math.random()*(max-min+1))+min;
      let b=Math.floor(Math.random()*(max-min+1))+min;
      let answer,display;
      if(op==='mult'){ answer=a*b; display=`<em>${a}</em> × <em>${b}</em>`; }
      else if(op==='div'){ const prod=a*b; answer=a; a=prod; display=`<em>${a}</em> ÷ <em>${b}</em>`; }
      else if(op==='add'){ answer=a+b; display=`<em>${a}</em> + <em>${b}</em>`; }
      else { if(a<b){const tmp=a;a=b;b=tmp;} answer=a-b; display=`<em>${a}</em> − <em>${b}</em>`; }
      return{display,answer,op};
    });

    const timePerQ=DIFFICULTY[diff].timePerQ, bonusThreshold=DIFFICULTY[diff].bonusThreshold;
    let current=0,score=0,bonusScore=0,streak=0,bestStreak=0,skipped=0;
    let timerInterval=null,timeLeft=timePerQ,answered=false,escListener=null;

    function clearTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }
    function removeEscListener(){ if(escListener){document.removeEventListener('keydown',escListener);escListener=null;} }
    function lockInput(){
      const inp=document.getElementById('inp'), go=document.getElementById('go');
      if(inp) inp.disabled=true; if(go) go.disabled=true;
    }
    function advance(){ clearTimer(); removeEscListener(); current++; setTimeout(showQuestion,200); }

    function doAnswer(v){
      if(answered) return; answered=true;
      clearTimer(); removeEscListener(); lockInput();
      const fb=document.getElementById('fb'), inp=document.getElementById('inp'), sb=document.getElementById('sb');
      if(v===questions[current].answer){
        score++; streak++; if(streak>bestStreak) bestStreak=streak;
        let bonusHtml=''; if((timeLeft/timePerQ)>=bonusThreshold){ bonusScore++; bonusHtml=`<span class="time-bonus">${t().time_bonus}</span>`; }
        if(inp) inp.classList.add('correct');
        if(fb){ fb.innerHTML=`${t().correct_msg}${bonusHtml}`; fb.className='feedback ok'; }
        card.classList.add('flash-ok'); setTimeout(()=>card.classList.remove('flash-ok'),500);
        if(sb){ sb.textContent='🔥 '+streak; sb.classList.remove('pop'); void sb.offsetWidth; sb.classList.add('pop'); }
        soundCorrect();
      } else {
        streak=0; if(inp) inp.classList.add('wrong');
        if(fb){ fb.textContent=`${t().wrong_prefix} ${questions[current].answer}`; fb.className='feedback err'; }
        card.classList.add('shake'); setTimeout(()=>card.classList.remove('shake'),400);
        if(sb) sb.textContent='🔥 0'; soundWrong();
      }
      setTimeout(advance, 1200);
    }

    function showQuestion(){
      if(current>=total){ showResult(score,total,bestStreak,bonusScore,skipped,diff,mode); return; }
      currentScreen=showQuestion; answered=false;
      const q=questions[current], pct=Math.round((current/total)*100);
      render(`
        ${topBar('badge_game')}
        <div class="progress-wrap">
          <div class="progress-meta"><span>${t().progress}</span><span id="sb" class="streak-badge">🔥 ${streak}</span><span>${pct}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="timer-wrap">
          <div class="timer-meta"><span>${t().timer_label}</span><span id="tl">${timePerQ}s</span></div>
          <div class="timer-track" id="timer-track" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
            <div class="timer-fill" id="tf" style="width:100%"></div>
          </div>
        </div>
        <div class="q-label"><span class="q-label-left">${t().q_label} ${current+1} / ${total}</span></div>
        <div class="q-text">${q.display} = ?</div>
        <div class="input-wrap">
          <input id="inp" class="input" type="number" placeholder="…" aria-label="Your answer" autocomplete="off" autofocus>
        </div>
        <div class="feedback" id="fb" role="alert" aria-live="assertive"></div>
        <button class="btn" id="go">${t().submit}</button>
        <p class="hint">${t().hint} <kbd>Esc</kbd></p>
        <p class="hint">${t().hint} <kbd>Enter</kbd></p>
      `);
      const inp=document.getElementById('inp'), fill=document.getElementById('tf'), tEl=document.getElementById('tl');
      inp.focus(); timeLeft=timePerQ;
      timerInterval=setInterval(()=>{
        timeLeft=Math.max(0,timeLeft-0.1); const p=(timeLeft/timePerQ)*100;
        if(fill){ fill.style.width=p+'%'; fill.className='timer-fill'+(p<30?' danger':p<60?' warn':''); }
        if(tEl) tEl.textContent=Math.ceil(timeLeft)+'s';
        if(timeLeft<=0){ clearTimer(); if(!answered){ streak=0; soundTimeout(); doAnswer(null); } }
      },100);
      escListener=(e)=>{ if(e.key==='Escape'){ clearTimer(); skipped++; streak=0; soundSkip(); advance(); } };
      document.addEventListener('keydown',escListener);
      document.getElementById('go').addEventListener('click',()=>doAnswer(parseInt(inp.value)));
      inp.addEventListener('keydown',e=>{if(e.key==='Enter') doAnswer(parseInt(inp.value));});
    }
    showQuestion();
  }

        <button class="hist-tab${histTab==='rush'?' rush-tab-inactive':''+(histTab==='rush'?' rush-tab-active':'')}" data-htab="rush">${t().hist_tab_rush}</button>
      </div>
      <div id="hist-rows">${rowsHtml(filtered)}</div>
      <div class="divider"></div>
      <button class="btn btn-outline" id="back">${t().back}</button>
    `);

    document.getElementById('back').addEventListener('click', showDashboard);
    const clr=document.getElementById('clr');
    if(clr) clr.addEventListener('click',()=>{clearHistory();histTab='all';showHistory();});

    document.querySelectorAll('.hist-tab').forEach(b=>{
      b.addEventListener('click',()=>{
        histTab=b.dataset.htab;
        document.querySelectorAll('.hist-tab').forEach(x=>{
          x.classList.remove('active','rush-tab-active','rush-tab-inactive');
          if(x===b){
            if(histTab==='rush') x.classList.add('rush-tab-active');
            else x.classList.add('active');
          } else {
            if(x.dataset.htab==='rush') x.classList.add('rush-tab-inactive');
          }
        });
        const rh = loadHistory();
        const f2 = histTab==='all'?rh:histTab==='rush'?rh.filter(h=>h.rush):rh.filter(h=>!h.rush);
        const el = document.getElementById('hist-rows');
        if(el) el.innerHTML=rowsHtml(f2);
      });
    });

    // Fix rush tab initial classes
    document.querySelectorAll('.hist-tab').forEach(x=>{
      if(x.dataset.htab==='rush' && histTab!=='rush') x.classList.add('rush-tab-inactive');
    });
  }

  /* ── Boot ── */
  document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
  document.getElementById('themeToggle').addEventListener('click',toggleTheme);
  setTheme(currentTheme); setLang(lang); showDashboard();
  </script>
</body>
</html>
