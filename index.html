<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Quiz — Sofien Ghorbel</title>
  <link rel="icon" href="/assets/game-ZeAdQyym.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=Cairo:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080c14;--bg2:#111827;--bg3:#1a2235;--accent:#00e5b4;--accent2:#3b82f6;--text:#e8eaf2;--muted:#5a6378;--border:rgba(255,255,255,0.06);--danger:#f87171;--success:#00e5b4;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;padding:2rem 1rem;}
    body.ar{font-family:'Cairo',sans-serif;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,180,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,180,0.025) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0;}
    #canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* lang switcher */
    .lang-switcher{position:fixed;top:1.1rem;right:1.2rem;display:flex;gap:4px;z-index:10;}
    html[dir="rtl"] .lang-switcher{right:auto;left:1.2rem;}
    .lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.06em;padding:3px 8px;border-radius:2px;cursor:pointer;transition:0.2s;text-transform:uppercase;}
    .lang-btn:hover{border-color:var(--accent);color:var(--accent);}
    .lang-btn.active{background:var(--accent);color:#080c14;border-color:var(--accent);}

    /* card */
    .card{position:relative;z-index:1;width:100%;max-width:480px;background:rgba(17,24,39,0.92);border:1px solid var(--border);border-radius:6px;padding:2.5rem 2.8rem;backdrop-filter:blur(12px);animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
    .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
    .logo-text{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:300;color:var(--text);}
    .logo-text span{color:var(--accent);}
    .badge{display:flex;align-items:center;gap:6px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);padding:3px 10px;border:1px solid rgba(0,229,180,0.2);border-radius:2px;}
    body.ar .badge{letter-spacing:0;font-size:0.72rem;}
    .badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.8s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}

    .progress-wrap{margin-bottom:2rem;}
    .progress-meta{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.5rem;}
    body.ar .progress-meta{letter-spacing:0;}
    .progress-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.4s ease;}

    .q-label{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;display:flex;align-items:center;gap:8px;}
    .q-label::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent);}
    body.ar .q-label{letter-spacing:0;}
    .q-text{font-family:'Fraunces',serif;font-size:clamp(2.2rem,8vw,3.8rem);font-weight:300;line-height:1.1;letter-spacing:-0.02em;color:var(--text);margin-bottom:2rem;}
    body.ar .q-text{font-family:'Cairo',sans-serif;letter-spacing:0;}
    .q-text em{font-style:italic;color:var(--accent);}
    .q-sub{font-size:0.85rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;}

    .input-wrap{position:relative;margin-bottom:1.2rem;}
    .input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:1rem;color:var(--text);outline:none;transition:border-color 0.2s;-moz-appearance:textfield;}
    body.ar .input{font-family:'Cairo',sans-serif;}
    .input::-webkit-outer-spin-button,.input::-webkit-inner-spin-button{-webkit-appearance:none;}
    .input::placeholder{color:var(--muted);}
    .input:focus{border-color:rgba(0,229,180,0.4);}
    .input.correct{border-color:var(--success);}
    .input.wrong{border-color:var(--danger);}

    .btn{width:100%;padding:0.8rem 1.6rem;font-family:'DM Mono',monospace;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--accent);color:#080c14;border:none;border-radius:2px;cursor:pointer;transition:background 0.2s,transform 0.1s;}
    body.ar .btn{font-family:'Cairo',sans-serif;letter-spacing:0;}
    .btn:hover{background:#00c9a0;}
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.5;cursor:default;}
    .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);margin-top:0.8rem;}
    .btn-outline:hover{background:rgba(0,229,180,0.07);}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);margin-top:0.8rem;}
    .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.15);}

    .feedback{font-size:0.78rem;height:1.2rem;margin-bottom:0.8rem;transition:color 0.2s;}
    .feedback.ok{color:var(--success);}
    .feedback.err{color:var(--danger);}

    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.8rem;}
    .score-cell{background:var(--bg3);padding:1.2rem 1rem;text-align:center;}
    .score-num{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:300;color:var(--accent);line-height:1;}
    .score-lbl{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    body.ar .score-lbl{letter-spacing:0;}

    .grade-tag{display:inline-block;font-size:0.75rem;letter-spacing:0.08em;padding:6px 14px;border-radius:2px;margin-bottom:1.8rem;text-transform:uppercase;}
    body.ar .grade-tag{letter-spacing:0;}
    .grade-perfect{background:rgba(0,229,180,0.12);color:var(--accent);border:1px solid rgba(0,229,180,0.3);}
    .grade-great{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);}
    .grade-good{background:rgba(250,204,21,0.1);color:#fde68a;border:1px solid rgba(250,204,21,0.25);}
    .grade-fail{background:rgba(248,113,113,0.1);color:var(--danger);border:1px solid rgba(248,113,113,0.25);}

    .divider{height:1px;background:var(--border);margin:1.5rem 0;}
    .hint{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:1rem;}
    .hint kbd{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:0.7rem;}

    /* history */
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .history-title{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;}
    .history-title::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent);}
    body.ar .history-title{letter-spacing:0;}
    .clear-btn{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.06em;background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:2px;cursor:pointer;transition:0.2s;text-transform:uppercase;}
    .clear-btn:hover{border-color:var(--danger);color:var(--danger);}

    .history-empty{font-size:0.8rem;color:var(--muted);text-align:center;padding:1.5rem 0;}

    .history-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;max-height:280px;overflow-y:auto;}
    .history-list::-webkit-scrollbar{width:4px;}
    .history-list::-webkit-scrollbar-track{background:transparent;}
    .history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    .history-row{background:var(--bg3);padding:0.8rem 1rem;display:grid;grid-template-columns:1fr auto auto;gap:1rem;align-items:center;font-size:0.78rem;transition:background 0.15s;}
    .history-row:hover{background:var(--bg2);}
    .history-date{color:var(--muted);font-size:0.7rem;}
    .history-score{color:var(--accent);font-weight:500;white-space:nowrap;}
    .history-grade{font-size:0.65rem;padding:2px 8px;border-radius:2px;white-space:nowrap;}

    @media(max-width:500px){
      .card{padding:1.8rem 1.5rem;}
      .history-row{grid-template-columns:1fr auto;}
      .history-grade{display:none;}
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="lang-switcher">
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="ar">AR</button>
  </div>

  <div id="app"></div>

  <script>
  // ── Translations ──
  const T = {
    en:{
      badge_quiz:'Math Quiz', badge_game:'In Game', badge_result:'Result', badge_history:'History',
      new_game:'New game', how_many:'How many questions?', choose:'Choose between 1 and 20',
      start:'Start Game', play_again:'Play Again', change_q:'Change Questions', view_history:'View History',
      back:'Back', clear_history:'Clear',
      q_label:'Question', progress:'Progress', submit:'Submit',
      correct_msg:'✓ Correct!', result_label:'Game over', your_score:'Your score',
      correct:'Correct', grade_label:'Grade', accuracy:'Accuracy', missed:'Missed',
      err_range:'Enter a number between 1 and 20', err_num:'Please enter a number',
      hint:'or press', history_title:'Game History', history_empty:'No games played yet.',
      date_col:'Date', score_col:'Score', grade_col:'Grade',
      grade_perfect:'Perfect! 🏆', grade_excellent:'Excellent! 🔥', grade_amazing:"You're Amazing! 🌟",
      grade_keep:'Keep Going 👍', grade_harder:'Try Harder 💪', grade_lose:'You Lose 😢',
      wrong_prefix:'✗ Answer was'
    },
    fr:{
      badge_quiz:'Quiz Maths', badge_game:'En jeu', badge_result:'Résultat', badge_history:'Historique',
      new_game:'Nouveau jeu', how_many:'Combien de questions ?', choose:'Choisir entre 1 et 20',
      start:'Commencer', play_again:'Rejouer', change_q:'Changer le nombre', view_history:"Voir l'historique",
      back:'Retour', clear_history:'Effacer',
      q_label:'Question', progress:'Progression', submit:'Valider',
      correct_msg:'✓ Correct !', result_label:'Fin de partie', your_score:'Votre score',
      correct:'Correct', grade_label:'Note', accuracy:'Précision', missed:'Manqué',
      err_range:'Entrez un nombre entre 1 et 20', err_num:'Veuillez entrer un nombre',
      hint:'ou appuyez sur', history_title:'Historique des parties', history_empty:'Aucune partie jouée.',
      date_col:'Date', score_col:'Score', grade_col:'Note',
      grade_perfect:'Parfait ! 🏆', grade_excellent:'Excellent ! 🔥', grade_amazing:'Incroyable ! 🌟',
      grade_keep:'Continue ! 👍', grade_harder:'Encore effort ! 💪', grade_lose:'Perdu 😢',
      wrong_prefix:'✗ Réponse :'
    },
    ar:{
      badge_quiz:'اختبار رياضيات', badge_game:'جارٍ اللعب', badge_result:'النتيجة', badge_history:'السجل',
      new_game:'لعبة جديدة', how_many:'كم سؤالاً تريد؟', choose:'اختر بين 1 و 20',
      start:'ابدأ اللعبة', play_again:'العب مجدداً', change_q:'تغيير العدد', view_history:'عرض السجل',
      back:'رجوع', clear_history:'مسح',
      q_label:'سؤال', progress:'التقدم', submit:'إرسال',
      correct_msg:'✓ صحيح!', result_label:'انتهت اللعبة', your_score:'نتيجتك',
      correct:'صحيح', grade_label:'الدرجة', accuracy:'الدقة', missed:'أخطأت',
      err_range:'أدخل رقماً بين 1 و 20', err_num:'يرجى إدخال رقم',
      hint:'أو اضغط', history_title:'سجل الألعاب', history_empty:'لم تُلعب أي لعبة بعد.',
      date_col:'التاريخ', score_col:'النتيجة', grade_col:'التقييم',
      grade_perfect:'مثالي! 🏆', grade_excellent:'ممتاز! 🔥', grade_amazing:'رائع! 🌟',
      grade_keep:'واصل! 👍', grade_harder:'حاول أكثر! 💪', grade_lose:'خسرت 😢',
      wrong_prefix:'✗ الإجابة كانت'
    }
  };

  // ── Language ──
  let currentScreen = null;

  function detectLang(){
    const s = localStorage.getItem('quiz-lang');
    if(s) return s;
    const b = (navigator.language||'en').toLowerCase().slice(0,2);
    if(b==='fr') return 'fr';
    if(b==='ar') return 'ar';
    return 'en';
  }
  let lang = detectLang();

  function setLang(l){
    lang = l;
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l==='ar'?'rtl':'ltr');
    document.body.classList.toggle('ar', l==='ar');
    document.querySelectorAll('.lang-btn[data-lang]').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
    localStorage.setItem('quiz-lang', l);
    if(typeof showSetup === 'function' && currentScreen) currentScreen();
  }

  // Bind lang buttons after script runs
  document.querySelectorAll('.lang-btn[data-lang]').forEach(b=>{
    b.addEventListener('click', ()=> setLang(b.dataset.lang));
  });

  const t = ()=> T[lang];

  // ── History ──
  const HISTORY_KEY = 'quiz-history';

  function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); }catch(e){ return []; } }
  function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
  function addHistory(entry){ const h=loadHistory(); h.unshift(entry); if(h.length>50) h.splice(50); saveHistory(h); }
  function clearHistory(){ saveHistory([]); }

  // ── Particles ──
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  function Pt(){ this.x=Math.random()*W; this.y=Math.random()*H; this.r=Math.random()*1.1+0.3; this.vx=(Math.random()-0.5)*0.25; this.vy=(Math.random()-0.5)*0.25; this.a=Math.random()*0.3+0.08; }
  for(let i=0;i<80;i++) pts.push(new Pt());
  function drawPts(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(0,229,180,${p.a})`; ctx.fill(); });
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){ const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy); if(d<110){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle=`rgba(0,229,180,${0.04*(1-d/110)})`; ctx.lineWidth=0.5; ctx.stroke(); } }
    requestAnimationFrame(drawPts);
  }
  drawPts();

  // ── Helpers ──
  const app = document.getElementById('app');

  function render(html){ app.innerHTML=`<div class="card">${html}</div>`; }

  function topBar(badgeKey){
    return `<div class="card-top">
      <div class="logo-text">Sofien <span>Ghorbel</span></div>
      <div class="badge"><span class="badge-dot"></span>${t()[badgeKey]}</div>
    </div>`;
  }

  function gradeInfo(score, total){
    const pct = total>0 ? score/total : 0;
    if(pct===1)   return {label:t().grade_perfect,   cls:'grade-perfect'};
    if(pct>=0.85) return {label:t().grade_excellent,  cls:'grade-great'};
    if(pct>=0.70) return {label:t().grade_amazing,    cls:'grade-great'};
    if(pct>=0.50) return {label:t().grade_keep,       cls:'grade-good'};
    if(pct>0)     return {label:t().grade_harder,     cls:'grade-fail'};
    return              {label:t().grade_lose,       cls:'grade-fail'};
  }

  function formatDate(ts){
    const d = new Date(ts);
    if(lang==='ar') return d.toLocaleDateString('ar-TN', {day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('ar-TN',{hour:'2-digit',minute:'2-digit'});
    if(lang==='fr') return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }

  // ── Screens ──
  function showSetup(){
    currentScreen = showSetup;
    render(`
      ${topBar('badge_quiz')}
      <div class="q-label">${t().new_game}</div>
      <div class="q-text">${t().how_many.replace('?','<em>?</em>')}</div>
      <p class="q-sub">${t().choose}</p>
      <div class="input-wrap">
        <input id="inp" class="input" type="number" min="1" max="20" placeholder="e.g. 10" autofocus>
      </div>
      <div class="feedback" id="fb"></div>
      <button class="btn" id="go">${t().start}</button>
      <button class="btn btn-ghost" id="hist">${t().view_history}</button>
      <p class="hint">${t().hint} <kbd>Enter</kbd></p>
    `);
    const inp=document.getElementById('inp'), fb=document.getElementById('fb');
    function submit(){
      const v=parseInt(inp.value);
      if(isNaN(v)||v<1||v>20){ fb.textContent=t().err_range; fb.className='feedback err'; inp.classList.add('wrong'); return; }
      startGame(v);
    }
    document.getElementById('go').addEventListener('click',submit);
    document.getElementById('hist').addEventListener('click',showHistory);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  }

  function startGame(total){
    let current=0, score=0;
    const questions=[];
    for(let i=0;i<total;i++){ const a=Math.floor(Math.random()*10)+1,b=Math.floor(Math.random()*10)+1; questions.push({a,b,answer:a*b}); }

    function showQuestion(){
      if(current>=total){ showResult(score,total); return; }
      currentScreen = showQuestion;
      const {a,b}=questions[current];
      const pct=Math.round((current/total)*100);
      render(`
        ${topBar('badge_game')}
        <div class="progress-wrap">
          <div class="progress-meta"><span>${t().progress}</span><span>${pct}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="q-label">${t().q_label} ${current+1} / ${total}</div>
        <div class="q-text"><em>${a}</em> × <em>${b}</em> = ?</div>
        <div class="input-wrap">
          <input id="inp" class="input" type="number" placeholder="…" autofocus>
        </div>
        <div class="feedback" id="fb"></div>
        <button class="btn" id="go">${t().submit}</button>
        <p class="hint">${t().hint} <kbd>Enter</kbd></p>
      `);
      const inp=document.getElementById('inp'), fb=document.getElementById('fb');
      function submit(){
        const v=parseInt(inp.value);
        if(isNaN(v)){ fb.textContent=t().err_num; fb.className='feedback err'; inp.classList.add('wrong'); return; }
        if(v===questions[current].answer){ score++; inp.classList.add('correct'); fb.textContent=t().correct_msg; fb.className='feedback ok'; }
        else{ inp.classList.add('wrong'); fb.textContent=`${t().wrong_prefix} ${questions[current].answer}`; fb.className='feedback err'; }
        document.getElementById('go').disabled=true; inp.disabled=true;
        current++;
        setTimeout(showQuestion,900);
      }
      document.getElementById('go').addEventListener('click',submit);
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
    }
    showQuestion();
  }

  function showResult(score, total){
    currentScreen = ()=> showResult(score, total);
    const pct=total>0?Math.round((score/total)*100):0;
    const scaled=Math.round((score/total)*20);
    const g=gradeInfo(score,total);

    // Save to history
    addHistory({ ts: Date.now(), score, total, scaled, pct, gradeLabel: g.label, gradeCls: g.cls });

    render(`
      ${topBar('badge_result')}
      <div class="q-label">${t().result_label}</div>
      <div class="q-text">${t().your_score.includes(' ') ? t().your_score.split(' ').map((w,i)=>i===t().your_score.split(' ').length-1?`<em>${w}</em>`:w).join(' ') : `<em>${t().your_score}</em>`}</div>
      <div class="score-grid">
        <div class="score-cell"><div class="score-num">${score}/${total}</div><div class="score-lbl">${t().correct}</div></div>
        <div class="score-cell"><div class="score-num">${scaled}/20</div><div class="score-lbl">${t().grade_label}</div></div>
        <div class="score-cell"><div class="score-num">${pct}%</div><div class="score-lbl">${t().accuracy}</div></div>
        <div class="score-cell"><div class="score-num">${total-score}</div><div class="score-lbl">${t().missed}</div></div>
      </div>
      <div class="grade-tag ${g.cls}">${g.label}</div>
      <div class="divider"></div>
      <button class="btn" id="again">${t().play_again}</button>
      <button class="btn btn-outline" id="change">${t().change_q}</button>
      <button class="btn btn-ghost" id="hist">${t().view_history}</button>
    `);
    document.getElementById('again').addEventListener('click',()=>startGame(total));
    document.getElementById('change').addEventListener('click',showSetup);
    document.getElementById('hist').addEventListener('click',showHistory);
  }

  function showHistory(){
    currentScreen = showHistory;
    const history = loadHistory();

    let rows = '';
    if(history.length===0){
      rows = `<p class="history-empty">${t().history_empty}</p>`;
    } else {
      rows = `<div class="history-list">` +
        history.map(h=>`
          <div class="history-row">
            <span class="history-date">${formatDate(h.ts)}</span>
            <span class="history-score">${h.score}/${h.total} · ${h.pct}%</span>
            <span class="history-grade grade-tag ${h.gradeCls}" style="margin-bottom:0;">${h.gradeLabel}</span>
          </div>
        `).join('') +
      `</div>`;
    }

    render(`
      ${topBar('badge_history')}
      <div class="history-header">
        <div class="history-title">${t().history_title}</div>
        ${history.length>0?`<button class="clear-btn" id="clr">${t().clear_history}</button>`:''}
      </div>
      ${rows}
      <div class="divider"></div>
      <button class="btn btn-outline" id="back">${t().back}</button>
    `);
    document.getElementById('back').addEventListener('click', showSetup);
    const clr=document.getElementById('clr');
    if(clr) clr.addEventListener('click',()=>{ clearHistory(); showHistory(); });
  }

  // Boot — init lang then start
  setLang(lang);
  showSetup();
  </script>
</body>
</html>
